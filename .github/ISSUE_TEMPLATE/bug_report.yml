name: 🐛 Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill in the details below so we can reproduce and fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run clean.py on my dataset, it...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `python clean.py --input ... --output ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected the files to be cleaned without error.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste the full error message or the cleaning_report.txt contents.
      render: shell

  - type: dropdown
    id: device
    attributes:
      label: Running on
      options:
        - GPU (NVIDIA CUDA)
        - CPU only
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / Ubuntu 22.04 / macOS 14
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.10"
    validations:
      required: true

  - type: input
    id: torch
    attributes:
      label: PyTorch version
      description: Run `python -c "import torch; print(torch.__version__)"`
      placeholder: "2.3.0+cu121"
