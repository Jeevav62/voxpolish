services:
  voxpolish:
    build: .
    image: voxpolish
    ports:
      - "7860:7860"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - GRADIO_INBROWSER=0
    # Mount a folder to clean datasets via the CLI instead of the UI:
    #   docker compose run --rm voxpolish python clean.py --input /data/in --output /data/out
    volumes:
      - ./data:/data
